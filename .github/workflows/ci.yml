name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: "3.7"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -v -s tests -p "test_*.py"

      - name: Check CLI module
        run: python -m pypathdub "C:\work\project\data.local" --fmt python-mingw
        env:
          PYTHONPATH: src

      - name: Check source checkout script
        run: python scripts/normalize_path_string.py "C:\work\project\data.local" --fmt python-wsl
